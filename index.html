<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>萬年輪班系統｜桃園維護組 無限年月查詢</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Noto Sans TC', '微軟正黑體', sans-serif;
        }

        body {
            background: #eef2f7;
            margin: 0;
            padding: 12px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            padding: 12px 12px 20px 12px;
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 4px 0;
            color: #1e466e;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
        }

        h1 small {
            font-size: 0.7rem;
            font-weight: normal;
            background: #e9f0f5;
            padding: 3px 10px;
            border-radius: 30px;
            color: #2c5a7a;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 8px 0 12px 0;
        }

        .date-picker-area {
            display: flex;
            gap: 8px;
            background: #f8fafd;
            padding: 6px 12px;
            border-radius: 48px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-picker-area select, .date-picker-area input {
            background: white;
            border: 1px solid #cbdde9;
            border-radius: 32px;
            padding: 6px 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e466e;
            cursor: pointer;
        }

        .goto-btn {
            background: #1e466e;
            color: white;
            border: none;
            border-radius: 32px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .goto-btn:hover {
            background: #0f3557;
        }

        .month-nav {
            display: flex;
            gap: 10px;
        }

        .month-nav button {
            background: #eef2ff;
            border: none;
            font-size: 1rem;
            padding: 6px 14px;
            border-radius: 32px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1e466e;
        }

        .month-nav button:hover {
            background: #dfe8f3;
        }

        .current-month {
            font-size: 1.2rem;
            font-weight: 700;
            background: #eef2ff;
            padding: 4px 16px;
            border-radius: 32px;
            color: #1e466e;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #f8fafd;
            padding: 6px 12px;
            border-radius: 40px;
            margin: 8px 0 12px 0;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .shift-badge {
            display: inline-block;
            width: 48px;
            text-align: center;
            padding: 2px 0;
            border-radius: 24px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .shift-badge.休假 { background: #cddae9; color: #3a4a66; }
        .shift-badge.早班 { background: #f9d56e; color: #5e3a00; }
        .shift-badge.小夜 { background: #6fbf8c; color: #1d4d2a; }
        .shift-badge.大夜 { background: #2c3e66; color: white; }

        .calendar-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2edf2;
            background: white;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            min-width: 700px;
        }

        .calendar-table th {
            background: #f0f6fe;
            padding: 8px 4px;
            font-weight: 700;
            color: #1f4e79;
            border-bottom: 1px solid #d0e0ee;
            text-align: center;
            font-size: 0.75rem;
        }

        .calendar-table td {
            border: 1px solid #e6edf4;
            padding: 6px 4px;
            vertical-align: top;
            background-color: #ffffff;
        }

        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            border-bottom: 1px dashed #e2edf2;
            padding-bottom: 4px;
        }
        .date-number {
            font-weight: 800;
            font-size: 0.85rem;
            color: #1e466e;
            background: #f0f4fa;
            padding: 0px 6px;
            border-radius: 20px;
        }
        .today-highlight {
            border: 2px solid #e34234;
            border-radius: 8px;
            background-color: #fff5f0;
        }
        .selected-highlight {
            border: 2px solid #ff8c00;
            border-radius: 8px;
            background-color: #fff9e8;
        }

        .shift-group-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .shift-category {
            background: #fefefe;
        }
        .category-title {
            font-size: 0.65rem;
            font-weight: 600;
            color: #4b6e8a;
            margin-bottom: 2px;
            padding-left: 2px;
        }
        .group-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .group-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f5f8fe;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        .group-tag .group-name {
            font-weight: 700;
            color: #1f5e8e;
        }
        .group-tag .shift-label {
            padding: 2px 5px;
            border-radius: 16px;
            font-size: 0.6rem;
        }

        footer {
            margin-top: 16px;
            text-align: center;
            font-size: 0.65rem;
            color: #6f8eae;
            border-top: 1px solid #dfe8f0;
            padding-top: 12px;
        }

        @media (max-width: 750px) {
            .container {
                padding: 10px;
            }
            .group-tag {
                font-size: 0.6rem;
                padding: 1px 4px;
            }
            .category-title {
                font-size: 0.6rem;
            }
            .date-number {
                font-size: 0.75rem;
            }
            .legend-item {
                font-size: 0.65rem;
            }
            .shift-badge {
                width: 42px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📅 桃園維護組 萬年輪班月曆
        <small>ML1 · ML2 · ML3 · ML4 (無限年月查詢)</small>
    </h1>
    
    <div class="controls">
        <div class="date-picker-area">
            <select id="yearSelect"></select>
            <select id="monthSelect"></select>
            <select id="daySelect"></select>
            <button class="goto-btn" id="gotoDateBtn">📅 跳轉</button>
        </div>
        <div class="month-nav">
            <button id="prevMonthBtn">◀ 上月</button>
            <div class="current-month" id="currentMonthDisplay">2026年4月</div>
            <button id="nextMonthBtn">下月 ▶</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="shift-badge 休假">休假</span> 休息日</div>
        <div class="legend-item"><span class="shift-badge 早班">早班</span> 早班 (M1)</div>
        <div class="legend-item"><span class="shift-badge 小夜">小夜</span> 小夜班 (N1)</div>
        <div class="legend-item"><span class="shift-badge 大夜">大夜</span> 大夜班 (N2)</div>
        <div class="legend-item" style="margin-left:auto;">🔁 排序：早班 → 小夜 → 大夜 → 休假</div>
    </div>

    <div class="calendar-wrapper">
        <table class="calendar-table" id="calendarTable">
            <thead>
                <tr><th>週日</th><th>週一</th><th>週二</th><th>週三</th><th>週四</th><th>週五</th><th>週六</th></tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>
    <footer>
        ✅ 基準日期：2026-04-01 (取自原始班表) · 無年份限制，可任意查詢前後千年 · 紅框為今日日期 · 橘框為選定日期
    </footer>
</div>

<script>
    // ======================= 核心數據：各組12天循環班型 (取自2026年4月前12天實際班表第5行) =======================
    const CYCLE_PATTERNS = {
        "ML1": ["早班", "早班", "早班", "休假", "大夜", "大夜", "大夜", "休假", "小夜", "小夜", "小夜", "休假"],
        "ML2": ["休假", "大夜", "大夜", "大夜", "休假", "小夜", "小夜", "小夜", "休假", "早班", "早班", "早班"],
        "ML3": ["小夜", "小夜", "休假", "早班", "早班", "早班", "休假", "大夜", "大夜", "大夜", "休假", "小夜"],
        "ML4": ["大夜", "休假", "小夜", "小夜", "小夜", "休假", "早班", "早班", "早班", "休假", "大夜", "大夜"]
    };
    const CYCLE_LEN = 12;
    const GROUPS = ["ML1", "ML2", "ML3", "ML4"];

    // 基準日期：2026年4月1日 (用於計算天數差)
    const BASE_DATE = new Date(2026, 3, 1);  // month 3 = 四月

    // 班型順序
    const SHIFT_ORDER = ["早班", "小夜", "大夜", "休假"];

    /**
     * 計算目標日期與基準日期的天數差 (只考慮日期，無限制範圍)
     * 使用純數學計算，支援任意前後年份 (包括負數)
     */
    function daysFromBase(targetDate) {
        const base = new Date(BASE_DATE.getFullYear(), BASE_DATE.getMonth(), BASE_DATE.getDate());
        const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        const diffTime = target - base;
        return Math.round(diffTime / (1000 * 60 * 60 * 24));
    }

    /**
     * 取得指定組別在指定日期的班型
     */
    function getShiftByDate(groupName, date) {
        const pattern = CYCLE_PATTERNS[groupName];
        const diff = daysFromBase(date);
        let idx = diff % CYCLE_LEN;
        if (idx < 0) idx += CYCLE_LEN;
        return pattern[idx];
    }

    // 全域變數
    let currentYear = 2026;
    let currentMonth = 3;      // 0-index, 3=四月
    let selectedDate = null;   // 儲存使用者選定的日期 (Date物件)
    let today = new Date();     // 真實今天
    today = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    // 動態產生年份下拉選單 (從西元元年到 9999，但實務上提供一個較大範圍，使用者可手動輸入)
    // 為了方便，提供一個範圍 -5000 到 5000 或更寬，但下拉選單不宜過長，改用 input number 讓使用者輸入年份會更佳。
    // 為符合「取消年限限制」，改用文字輸入框讓使用者任意輸入年份，保留月份/日期下拉。
    // 這樣使用者可輸入任何整數年份 (負數表示公元前亦可，但 JS Date 物件支援 0~99 為 1900 年代，負數較複雜，
    // 為簡化且確保日期正確，我們使用標準 Date 物件，它支援公元 1 年到 275760 年，負數年份不支援。因此我們允許 1 ~ 9999 年。
    // 若使用者想查公元前，可自行轉換，但實務上不需要。提供 1~9999 足夠。
    function populateDateSelectors() {
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const daySelect = document.getElementById('daySelect');
        
        // 年份選項：提供一個範圍從 1900 到 2100 不夠萬年，改為 input number 讓使用者自由輸入
        // 因此將 select 改為 input type="number"
        const yearInput = document.createElement('input');
        yearInput.type = 'number';
        yearInput.id = 'yearInput';
        yearInput.placeholder = '年份';
        yearInput.value = currentYear;
        yearInput.style.width = '90px';
        yearInput.style.padding = '6px 8px';
        yearInput.style.borderRadius = '32px';
        yearInput.style.border = '1px solid #cbdde9';
        
        // 取代原本的 select
        yearSelect.parentNode.replaceChild(yearInput, yearSelect);
        yearInput.id = 'yearInput';
        
        // 月份 1~12
        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = `${m}月`;
            monthSelect.appendChild(opt);
        }
        
        // 日期更新函數
        function updateDaySelectWithYearMonth() {
            const y = parseInt(yearInput.value);
            const m = parseInt(monthSelect.value) - 1;
            if (isNaN(y) || isNaN(m)) return;
            const daysInMonth = getMonthDays(y, m);
            daySelect.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = `${d}日`;
                daySelect.appendChild(opt);
            }
            // 保持原本選定日期在範圍內
            let currentDay = parseInt(daySelect.value);
            if (isNaN(currentDay) || currentDay > daysInMonth) currentDay = 1;
            daySelect.value = currentDay;
        }
        
        yearInput.addEventListener('change', () => {
            updateDaySelectWithYearMonth();
            const y = parseInt(yearInput.value);
            const m = parseInt(monthSelect.value) - 1;
            const d = parseInt(daySelect.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
                goToExactDate(y, m, d);
            }
        });
        monthSelect.addEventListener('change', () => {
            updateDaySelectWithYearMonth();
            const y = parseInt(yearInput.value);
            const m = parseInt(monthSelect.value) - 1;
            const d = parseInt(daySelect.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
                goToExactDate(y, m, d);
            }
        });
        daySelect.addEventListener('change', () => {
            const y = parseInt(yearInput.value);
            const m = parseInt(monthSelect.value) - 1;
            const d = parseInt(daySelect.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
                goToExactDate(y, m, d);
            }
        });
        
        // 初始化日期選單
        updateDaySelectWithYearMonth();
        
        // 儲存額外引用
        window.yearInput = yearInput;
    }

    function getMonthDays(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    function getFirstDayWeekIndex(year, month) {
        return new Date(year, month, 1).getDay();
    }

    // 渲染月曆，並處理今天紅框、選定橘框
    function renderCalendar(year, month, highlightSelectedDate = null) {
        const firstDayWeek = getFirstDayWeekIndex(year, month);
        const daysInMonth = getMonthDays(year, month);
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        let dateCounter = 1;
        let currentRow = null;
        const totalCells = 42;

        for (let i = 0; i < totalCells; i++) {
            const weekCol = i % 7;
            if (weekCol === 0) {
                currentRow = document.createElement("tr");
                tbody.appendChild(currentRow);
            }

            if (i < firstDayWeek || dateCounter > daysInMonth) {
                const emptyCell = document.createElement("td");
                emptyCell.style.backgroundColor = "#fafcff";
                emptyCell.style.verticalAlign = "top";
                emptyCell.style.padding = "6px 4px";
                emptyCell.innerHTML = "&nbsp;";
                currentRow.appendChild(emptyCell);
                continue;
            }

            const currentDate = new Date(year, month, dateCounter);
            const weekDay = currentDate.getDay();
            const isWeekend = (weekDay === 0 || weekDay === 6);

            const cell = document.createElement("td");
            cell.style.verticalAlign = "top";
            cell.style.padding = "6px 4px";
            if (isWeekend) cell.style.backgroundColor = "#fffaf0";
            else cell.style.backgroundColor = "#ffffff";

            // 判斷是否為今天 (紅框)
            const isToday = (currentDate.getTime() === today.getTime());
            const isSelected = (highlightSelectedDate && currentDate.getTime() === highlightSelectedDate.getTime());
            if (isToday) {
                cell.classList.add('today-highlight');
                cell.style.border = "2px solid #e34234";
            } else if (isSelected) {
                cell.classList.add('selected-highlight');
                cell.style.border = "2px solid #ff8c00";
            } else {
                cell.style.border = "1px solid #e6edf4";
            }

            // 日期標頭
            const weekStr = ["日", "一", "二", "三", "四", "五", "六"][weekDay];
            const dateHeader = `
                <div class="date-header">
                    <span class="date-number">${dateCounter}</span>
                    <span style="font-size:0.65rem; color:#7a8eaa;">${weekStr}</span>
                </div>
            `;

            // 收集當日各組班型
            const groupShifts = {};
            for (let g of GROUPS) {
                const shift = getShiftByDate(g, currentDate);
                if (!groupShifts[shift]) groupShifts[shift] = [];
                groupShifts[shift].push(g);
            }

            let groupsHtml = '<div class="shift-group-list">';
            for (let shiftType of SHIFT_ORDER) {
                const groupsWithShift = groupShifts[shiftType];
                if (!groupsWithShift || groupsWithShift.length === 0) continue;
                groupsWithShift.sort((a,b) => GROUPS.indexOf(a) - GROUPS.indexOf(b));
                const shiftClass = (shiftType === "早班" ? "早班" : (shiftType === "小夜" ? "小夜" : (shiftType === "大夜" ? "大夜" : "休假")));
                groupsHtml += `
                    <div class="shift-category">
                        <div class="category-title">${shiftType}</div>
                        <div class="group-tags">
                            ${groupsWithShift.map(g => `
                                <span class="group-tag">
                                    <span class="group-name">${g}</span>
                                    <span class="shift-label shift-badge ${shiftClass}">${shiftType}</span>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            groupsHtml += '</div>';
            cell.innerHTML = dateHeader + groupsHtml;
            currentRow.appendChild(cell);
            dateCounter++;
        }

        // 更新標題
        const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        document.getElementById("currentMonthDisplay").innerHTML = `${year}年 ${monthNames[month]}`;
    }

    // 直接跳轉到指定完整日期 (年月日)
    function goToExactDate(year, month, day) {
        // 建構日期物件 (注意 month 是 0-index)
        let targetDate = new Date(year, month, day);
        // 如果日期無效 (例如 2月30日)，會自動進位到下個月，我們需要處理避免異常
        if (targetDate.getMonth() !== month || targetDate.getDate() !== day) {
            // 日期無效，修正為當月最後一天
            const lastDay = getMonthDays(year, month);
            targetDate = new Date(year, month, lastDay);
        }
        // 切換月份到該日期所在月份
        currentYear = targetDate.getFullYear();
        currentMonth = targetDate.getMonth();
        selectedDate = new Date(currentYear, currentMonth, targetDate.getDate());
        
        // 同步 UI 元件
        if (window.yearInput) {
            window.yearInput.value = currentYear;
        }
        document.getElementById('monthSelect').value = currentMonth + 1;
        // 更新日期的下拉選單內容
        const daySelect = document.getElementById('daySelect');
        const daysInMonth = getMonthDays(currentYear, currentMonth);
        daySelect.innerHTML = '';
        for (let d = 1; d <= daysInMonth; d++) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = `${d}日`;
            daySelect.appendChild(opt);
        }
        daySelect.value = selectedDate.getDate();
        
        renderCalendar(currentYear, currentMonth, selectedDate);
    }

    // 上下月切換
    function prevMonth() {
        let newYear = currentYear;
        let newMonth = currentMonth - 1;
        if (newMonth < 0) {
            newMonth = 11;
            newYear--;
        }
        // 無限制，直接切換
        goToExactDate(newYear, newMonth, 1);
    }

    function nextMonth() {
        let newYear = currentYear;
        let newMonth = currentMonth + 1;
        if (newMonth > 11) {
            newMonth = 0;
            newYear++;
        }
        goToExactDate(newYear, newMonth, 1);
    }

    // 初始化控制項與事件
    function initControls() {
        const gotoBtn = document.getElementById('gotoDateBtn');
        gotoBtn.addEventListener('click', () => {
            const y = parseInt(window.yearInput.value);
            const m = parseInt(document.getElementById('monthSelect').value) - 1;
            const d = parseInt(document.getElementById('daySelect').value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
                goToExactDate(y, m, d);
            }
        });
        
        // 綁定上下月按鈕
        document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);
    }

    // 初始顯示：以今天所在的月份為基準
    function initToday() {
        let initYear = today.getFullYear();
        let initMonth = today.getMonth();
        currentYear = initYear;
        currentMonth = initMonth;
        selectedDate = new Date(currentYear, currentMonth, Math.min(today.getDate(), getMonthDays(currentYear, currentMonth)));
        
        populateDateSelectors();  // 建立年份輸入框、月份/日期下拉
        // 同步年份輸入框
        if (window.yearInput) window.yearInput.value = currentYear;
        document.getElementById('monthSelect').value = currentMonth + 1;
        const daySelect = document.getElementById('daySelect');
        const daysInMonth = getMonthDays(currentYear, currentMonth);
        daySelect.innerHTML = '';
        for (let d = 1; d <= daysInMonth; d++) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = `${d}日`;
            daySelect.appendChild(opt);
        }
        daySelect.value = selectedDate.getDate();
        
        renderCalendar(currentYear, currentMonth, selectedDate);
        initControls();
    }
    
    initToday();
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>萬年輪班系統｜航線修護本部 班表月曆</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Noto Sans TC', '微軟正黑體', sans-serif;
        }
        body {
            background: #fef7e6;
            margin: 0;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: #fef7e6;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            padding: 20px 20px 24px 20px;
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: nowrap;
            margin-bottom: 16px;
            gap: 12px;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0;
            color: #5a3e1b;
            white-space: nowrap;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: nowrap;
        }
        h1 small {
            font-size: 0.75rem;
            font-weight: normal;
            background: #e6d9bf;
            padding: 4px 12px;
            border-radius: 40px;
            color: #5a3e1b;
            white-space: nowrap;
        }
        .btn-download {
            background: #2c6e2c;
            border: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s;
            flex-shrink: 0;
        }
        .btn-download:hover {
            background: #1e551e;
            transform: scale(0.97);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 8px 0 12px 0;
        }
        .date-picker-area {
            display: flex;
            gap: 10px;
            background: #e6d9bf;
            padding: 6px 16px;
            border-radius: 60px;
            align-items: center;
            flex-wrap: wrap;
        }
        .date-picker-area select, .goto-btn {
            background: white;
            border: 1px solid #cbdde9;
            border-radius: 36px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e466e;
            cursor: pointer;
        }
        .goto-btn {
            background: #1e466e;
            color: white;
            border: none;
        }
        .week-start-option {
            background: #e6d9bf;
            padding: 6px 16px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 0.8rem;
        }
        .week-start-option label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #5a3e1b;
            font-weight: 500;
        }
        .month-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .month-nav button {
            background: #e6d9bf;
            border: none;
            font-size: 1rem;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #5a3e1b;
            transition: 0.2s;
        }
        .month-nav button:hover {
            background: #d8cbae;
        }
        .current-month {
            font-size: 1.3rem;
            font-weight: 800;
            background: #e6d9bf;
            padding: 6px 24px;
            border-radius: 48px;
            color: #5a3e1b;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #e6d9bf;
            padding: 10px 20px;
            border-radius: 60px;
            margin: 10px 0 20px 0;
            font-size: 0.75rem;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }
        .legend-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .legend-badge.休假 { background: #d4f1d4; color: #2c5a2c; }
        .legend-badge.早班 { background: #fcc5c5; color: #8b0000; }
        .legend-badge.小夜 { background: #fff0b3; color: #8a6e2c; }
        .legend-badge.大夜 { background: #cce5ff; color: #003366; }
        .legend-time {
            font-size: 0.7rem;
            font-weight: normal;
            margin-left: 4px;
        }
        .calendar-wrapper {
            overflow-x: auto;
            border-radius: 28px;
            border: 1px solid #d4c8b0;
            background: #fef7e6;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }
        .capture-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 12px 0 8px 0;
            margin: 0;
            color: #5a3e1b;
            background: #fef7e6;
            border-bottom: 2px solid #e6d9bf;
        }
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 800px;
        }
        .calendar-table th {
            background: #e6d9bf;
            padding: 14px 6px;
            font-weight: 700;
            color: #5a3e1b;
            border-bottom: 2px solid #d4c8b0;
            text-align: center;
            font-size: 0.85rem;
        }
        /* 固定每個日期格子的高度，內容過多可滾動 */
        .calendar-table td {
            border: 2px solid #333333;
            padding: 8px 6px;
            vertical-align: top;
            background-color: #fef7e6;
            height: 140px;          /* 固定高度 */
            overflow-y: auto;       /* 內容過多時滾動，保持格子大小一致 */
        }
        .calendar-table td.today-cell {
            border: 3px solid #e34234 !important;
            background-color: #fff0e8;
        }
        .calendar-table td.selected-cell {
            border: 3px solid #e34234 !important;
            background-color: #fff0e8;
        }
        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            border-bottom: 1px solid #e6d9bf;
            padding-bottom: 4px;
        }
        .date-info {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .date-number {
            font-weight: 800;
            font-size: 1rem;
            color: #5a3e1b;
            background: #e6d9bf;
            padding: 2px 8px;
            border-radius: 40px;
        }
        .holiday-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #c0392b;
            background: #ffe6e2;
            padding: 2px 6px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .date-header > span:last-child {
            font-size: 0.85rem;
            font-weight: 500;
            color: #7a6a4e;
        }
        .shift-group-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .shift-category {
            background: #fef7e6;
            border-radius: 16px;
            padding: 2px 0;
        }
        .category-title {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 40px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .category-title.早班 { background: #fcc5c5; color: #8b0000; }
        .category-title.小夜 { background: #fff0b3; color: #8a6e2c; }
        .category-title.大夜 { background: #cce5ff; color: #003366; }
        .category-title.休假 { background: #d4f1d4; color: #2c5a2c; }
        .shift-time, .shift-time-rz {
            font-size: 0.65rem;
            font-weight: normal;
            margin-left: 6px;
        }
        .group-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 2px;
        }
        .group-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f8fafd;
            padding: 2px 8px;
            border-radius: 32px;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .group-tag .ml-letter {
            font-weight: 700;
            color: #2c3e50;
            display: inline-block;
            vertical-align: middle;
        }
        .group-tag .ml-number {
            font-weight: 800;
            font-size: 1rem;
            display: inline-block;
            vertical-align: middle;
        }
        .ml-number.ml1 { color: #e74c3c; }
        .ml-number.ml2 { color: #f1c40f; text-shadow: 0 0 1px rgba(0,0,0,0.2); }
        .ml-number.ml3 { color: #3498db; }
        .ml-number.ml4 { color: #2ecc71; }
        .shift-separator {
            border-top: 1px dashed #e34234;
            margin: 4px 0 2px 0;
        }
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #7a6a4e;
            border-top: 1px solid #e6d9bf;
            padding-top: 16px;
        }
        @media (max-width: 750px) {
            .container { padding: 12px; }
            .header-area { flex-wrap: wrap; }
            h1 { font-size: 1.2rem; white-space: normal; }
            h1 small { font-size: 0.7rem; }
            .btn-download { padding: 6px 12px; font-size: 0.75rem; }
            .calendar-table td { height: 150px; padding: 6px 4px; }
            .group-tag { font-size: 0.8rem; padding: 2px 6px; }
            .group-tag .ml-number { font-size: 0.9rem; }
            .category-title { font-size: 0.7rem; padding: 3px 6px; }
            .date-number { font-size: 0.85rem; }
            .holiday-name, .date-header > span:last-child { font-size: 0.75rem; }
            .capture-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container" id="calendarContainer">
    <div class="header-area">
        <h1 id="mainTitle">航線修護本部 萬年輪班月曆</h1>
        <button class="btn-download" id="downloadBtn">📸 下載本月圖片</button>
    </div>
    <div class="controls">
        <div class="date-picker-area">
            <select id="yearSelect"></select>
            <select id="monthSelect"></select>
            <select id="daySelect"></select>
            <button class="goto-btn" id="gotoDateBtn">📅 跳轉</button>
        </div>
        <div class="week-start-option">
            <label><input type="radio" name="weekStart" value="0" checked> 週日開始</label>
            <label><input type="radio" name="weekStart" value="1"> 週一開始</label>
        </div>
        <div class="month-nav">
            <button id="prevMonthBtn">◀ 上月</button>
            <div class="current-month" id="currentMonthDisplay">2026年4月</div>
            <button id="nextMonthBtn">下月 ▶</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="legend-badge 休假">休假 <span class="legend-time">R,Z</span></span></div>
        <div class="legend-item"><span class="legend-badge 早班">早班 <span class="legend-time">06:00-14:00</span></span></div>
        <div class="legend-item"><span class="legend-badge 小夜">小夜 <span class="legend-time">14:30-22:30</span></span></div>
        <div class="legend-item"><span class="legend-badge 大夜">大夜 <span class="legend-time">22:30-06:30</span></span></div>
        <div class="legend-item" style="margin-left:auto;">🔁 排序：早班 → 小夜 → 大夜 → 休假</div>
    </div>

    <div class="calendar-wrapper" id="captureArea">
        <div id="captureTitle" class="capture-title">2026年4月 航線修護本部輪班表</div>
        <table class="calendar-table" id="calendarTable">
            <thead id="tableHeader"></thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>
    <footer>✅ 基準日期：2026-04-01 · 年份範圍 1950~2150 · 紅框為今日 · 選定日期同樣為紅框<br>📌 可切換「週日/週一」為每週第一天，下載圖片會自動帶入年月標題。</footer>
</div>

<script>
    // ======================= 班型週期資料 =======================
    const CYCLE_PATTERNS = {
        "ML1": ["早班", "早班", "早班", "休假", "大夜", "大夜", "大夜", "休假", "小夜", "小夜", "小夜", "休假"],
        "ML2": ["休假", "大夜", "大夜", "大夜", "休假", "小夜", "小夜", "小夜", "休假", "早班", "早班", "早班"],
        "ML3": ["小夜", "小夜", "休假", "早班", "早班", "早班", "休假", "大夜", "大夜", "大夜", "休假", "小夜"],
        "ML4": ["大夜", "休假", "小夜", "小夜", "小夜", "休假", "早班", "早班", "早班", "休假", "大夜", "大夜"]
    };
    const CYCLE_LEN = 12;
    const GROUPS = ["ML1", "ML2", "ML3", "ML4"];
    const BASE_DATE = new Date(2026, 3, 1);
    const SHIFT_ORDER = ["早班", "小夜", "大夜", "休假"];
    const SHIFT_TIMES = { "早班": "06:00-14:00", "小夜": "14:30-22:30", "大夜": "22:30-06:30", "休假": "R,Z" };

    function getHolidayName(month, day, year) {
        const key = `${month+1}/${day}`;
        const fixedHolidays = {
            "1/1": "元旦",
            "2/28": "和平紀念日",
            "4/4": "兒童節",
            "5/1": "勞動節",
            "9/28": "教師節",
            "10/10": "國慶日",
            "10/25": "臺灣光復節",
            "12/25": "行憲紀念日"
        };
        if (fixedHolidays[key]) return fixedHolidays[key];
        if (month+1 === 4 && (day === 4 || day === 5)) return "清明節";
        return null;
    }

    function daysFromBase(targetDate) {
        const base = new Date(BASE_DATE.getFullYear(), BASE_DATE.getMonth(), BASE_DATE.getDate());
        const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
        return Math.round((target - base) / (1000 * 60 * 60 * 24));
    }
    function getShiftByDate(groupName, date) {
        const pattern = CYCLE_PATTERNS[groupName];
        const diff = daysFromBase(date);
        let idx = diff % CYCLE_LEN;
        if (idx < 0) idx += CYCLE_LEN;
        return pattern[idx];
    }

    let currentYear = 2026, currentMonth = 3;
    let selectedDate = null;
    let today = new Date();
    today = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    let weekStart = 0;

    function getMonthDays(year, month) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOffset(year, month, startWeek) {
        const firstDayWeek = new Date(year, month, 1).getDay();
        if (startWeek === 0) return firstDayWeek;
        return (firstDayWeek === 0) ? 6 : firstDayWeek - 1;
    }
    function getWeekdayHeaders(startWeek) {
        const days = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
        if (startWeek === 0) return days;
        return [...days.slice(1), days[0]];
    }

    function updateCaptureTitle(year, month) {
        const titleDiv = document.getElementById('captureTitle');
        if (titleDiv) {
            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            titleDiv.innerText = `${year}年 ${monthNames[month]} 航線修護本部輪班表`;
        }
    }

    function formatTodayDate() {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = today.getDate();
        const m = months[today.getMonth()];
        const y = today.getFullYear();
        return `${d}/${m}/${y}`;
    }

    function updateMainTitle() {
        const titleEl = document.getElementById('mainTitle');
        if (titleEl) {
            const dateStr = formatTodayDate();
            titleEl.innerHTML = `${dateStr} 航線修護本部 萬年輪班月曆 <small>ML1 · ML2 · ML3 · ML4</small>`;
        }
    }

    function formatGroupTag(groupName) {
        const number = groupName.slice(2);
        let colorClass = '';
        if (number === '1') colorClass = 'ml1';
        else if (number === '2') colorClass = 'ml2';
        else if (number === '3') colorClass = 'ml3';
        else if (number === '4') colorClass = 'ml4';
        return `<span class="group-tag"><span class="ml-letter">ML</span><span class="ml-number ${colorClass}">${number}</span></span>`;
    }

    function renderCalendar(year, month, highlightSelectedDate = null, startWeek = weekStart) {
        const offset = getFirstDayOffset(year, month, startWeek);
        const daysInMonth = getMonthDays(year, month);
        const tbody = document.getElementById("calendarBody");
        const thead = document.getElementById("tableHeader");
        tbody.innerHTML = "";
        const headers = getWeekdayHeaders(startWeek);
        thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</td>`;
        
        let dateCounter = 1;
        let currentRow = null;
        const totalCells = 42;
        for (let i = 0; i < totalCells; i++) {
            const weekCol = i % 7;
            if (weekCol === 0) {
                currentRow = document.createElement("tr");
                tbody.appendChild(currentRow);
            }
            if (i < offset || dateCounter > daysInMonth) {
                const emptyCell = document.createElement("td");
                emptyCell.style.backgroundColor = "#fef7e6";
                emptyCell.style.padding = "10px 6px";
                emptyCell.innerHTML = "&nbsp;";
                currentRow.appendChild(emptyCell);
                continue;
            }
            const currentDate = new Date(year, month, dateCounter);
            const weekDay = currentDate.getDay();
            const isWeekend = (startWeek === 0 && (weekDay === 0 || weekDay === 6)) || (startWeek === 1 && (weekDay === 6 || weekDay === 0));
            const cell = document.createElement("td");
            cell.style.verticalAlign = "top";
            cell.style.padding = "8px 6px";
            cell.style.backgroundColor = isWeekend ? "#fef7e6" : "#fef7e6";
            
            const isToday = (currentDate.getTime() === today.getTime());
            const isSelected = (highlightSelectedDate && currentDate.getTime() === highlightSelectedDate.getTime());
            
            if (isToday) {
                cell.classList.add('today-cell');
            }
            if (isSelected) {
                cell.classList.add('selected-cell');
            }
            
            const weekStr = headers[weekCol];
            const holiday = getHolidayName(month, dateCounter, year);
            const dateHeader = `
                <div class="date-header">
                    <div class="date-info">
                        <span class="date-number">${dateCounter}號</span>
                        ${holiday ? `<span class="holiday-name">${holiday}</span>` : ''}
                    </div>
                    <span>${weekStr}</span>
                </div>
            `;
            
            const groupShifts = {};
            for (let g of GROUPS) {
                const shift = getShiftByDate(g, currentDate);
                if (!groupShifts[shift]) groupShifts[shift] = [];
                groupShifts[shift].push(g);
            }
            
            let groupsHtml = '<div class="shift-group-list">';
            let hasPreviousShift = false;
            for (let shiftType of SHIFT_ORDER) {
                const groupsWithShift = groupShifts[shiftType];
                if (!groupsWithShift || groupsWithShift.length === 0) continue;
                groupsWithShift.sort((a,b) => GROUPS.indexOf(a) - GROUPS.indexOf(b));
                const timeLabel = SHIFT_TIMES[shiftType];
                let timeHtml = '';
                let titleClass = '';
                if (shiftType === '早班') {
                    titleClass = '早班';
                    timeHtml = `<span class="shift-time">${timeLabel}</span>`;
                } else if (shiftType === '小夜') {
                    titleClass = '小夜';
                    timeHtml = `<span class="shift-time">${timeLabel}</span>`;
                } else if (shiftType === '大夜') {
                    titleClass = '大夜';
                    timeHtml = `<span class="shift-time">${timeLabel}</span>`;
                } else { // 休假
                    titleClass = '休假';
                    timeHtml = `<span class="shift-time-rz">${timeLabel}</span>`;
                }
                if (shiftType === '休假' && hasPreviousShift) {
                    groupsHtml += `<div class="shift-separator"></div>`;
                }
                groupsHtml += `
                    <div class="shift-category">
                        <div class="category-title ${titleClass}">
                            <span>${shiftType}</span>
                            ${timeHtml}
                        </div>
                        <div class="group-tags">
                            ${groupsWithShift.map(g => formatGroupTag(g)).join('')}
                        </div>
                    </div>
                `;
                hasPreviousShift = true;
            }
            groupsHtml += '</div>';
            cell.innerHTML = dateHeader + groupsHtml;
            currentRow.appendChild(cell);
            dateCounter++;
        }
        const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        document.getElementById("currentMonthDisplay").innerHTML = `${year}年 ${monthNames[month]}`;
        updateCaptureTitle(year, month);
    }

    function goToExactDate(year, month, day) {
        let targetDate = new Date(year, month, day);
        if (targetDate.getMonth() !== month || targetDate.getDate() !== day) {
            const lastDay = getMonthDays(year, month);
            targetDate = new Date(year, month, lastDay);
        }
        currentYear = targetDate.getFullYear();
        currentMonth = targetDate.getMonth();
        selectedDate = new Date(currentYear, currentMonth, targetDate.getDate());
        document.getElementById('yearSelect').value = currentYear;
        document.getElementById('monthSelect').value = currentMonth + 1;
        updateDaySelect(currentYear, currentMonth);
        document.getElementById('daySelect').value = selectedDate.getDate();
        renderCalendar(currentYear, currentMonth, selectedDate, weekStart);
    }

    function prevMonth() {
        let newYear = currentYear, newMonth = currentMonth - 1;
        if (newMonth < 0) { newMonth = 11; newYear--; }
        goToExactDate(newYear, newMonth, 1);
    }
    function nextMonth() {
        let newYear = currentYear, newMonth = currentMonth + 1;
        if (newMonth > 11) { newMonth = 0; newYear++; }
        goToExactDate(newYear, newMonth, 1);
    }

    function populateYearSelect() {
        const yearSelect = document.getElementById('yearSelect');
        for (let y = 1950; y <= 2150; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = `${y}年`;
            yearSelect.appendChild(opt);
        }
        yearSelect.value = currentYear;
    }
    function populateMonthSelect() {
        const monthSelect = document.getElementById('monthSelect');
        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = `${m}月`;
            monthSelect.appendChild(opt);
        }
        monthSelect.value = currentMonth + 1;
    }
    function updateDaySelect(year, month) {
        const daySelect = document.getElementById('daySelect');
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        daySelect.innerHTML = '';
        for (let d = 1; d <= daysInMonth; d++) {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = `${d}日`;
            daySelect.appendChild(opt);
        }
        let currentDay = selectedDate ? selectedDate.getDate() : 1;
        if (currentDay > daysInMonth) currentDay = daysInMonth;
        daySelect.value = currentDay;
    }

    function initControls() {
        const yearSel = document.getElementById('yearSelect');
        const monthSel = document.getElementById('monthSelect');
        const daySel = document.getElementById('daySelect');
        const gotoBtn = document.getElementById('gotoDateBtn');
        yearSel.addEventListener('change', () => {
            const y = parseInt(yearSel.value), m = parseInt(monthSel.value)-1, d = parseInt(daySel.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) goToExactDate(y, m, d);
        });
        monthSel.addEventListener('change', () => {
            const y = parseInt(yearSel.value), m = parseInt(monthSel.value)-1, d = parseInt(daySel.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) goToExactDate(y, m, d);
        });
        daySel.addEventListener('change', () => {
            const y = parseInt(yearSel.value), m = parseInt(monthSel.value)-1, d = parseInt(daySel.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) goToExactDate(y, m, d);
        });
        gotoBtn.addEventListener('click', () => {
            const y = parseInt(yearSel.value), m = parseInt(monthSel.value)-1, d = parseInt(daySel.value);
            if (!isNaN(y) && !isNaN(m) && !isNaN(d)) goToExactDate(y, m, d);
        });
        document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);
        
        const radioSunday = document.querySelector('input[value="0"]');
        const radioMonday = document.querySelector('input[value="1"]');
        radioSunday.addEventListener('change', () => {
            if (radioSunday.checked) { weekStart = 0; renderCalendar(currentYear, currentMonth, selectedDate, 0); }
        });
        radioMonday.addEventListener('change', () => {
            if (radioMonday.checked) { weekStart = 1; renderCalendar(currentYear, currentMonth, selectedDate, 1); }
        });
    }

    async function downloadCalendarImage() {
        const captureElement = document.getElementById('captureArea');
        if (!captureElement) return;
        const originalOverflowX = captureElement.style.overflowX;
        const originalWidth = captureElement.style.width;
        captureElement.style.overflowX = 'visible';
        captureElement.style.width = 'max-content';
        const table = captureElement.querySelector('table');
        if (table) table.style.width = 'max-content';
        try {
            const canvas = await html2canvas(captureElement, {
                scale: 2.8,
                backgroundColor: '#fef7e6',
                logging: false,
                useCORS: false,
                allowTaint: false,
                windowWidth: captureElement.scrollWidth,
                windowHeight: captureElement.scrollHeight
            });
            const link = document.createElement('a');
            const yearMonth = document.getElementById('currentMonthDisplay').innerText;
            link.download = `輪班表_${yearMonth}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            console.error('截圖失敗:', err);
            alert('產生圖片失敗，請稍後重試。');
        } finally {
            captureElement.style.overflowX = originalOverflowX;
            captureElement.style.width = originalWidth;
            if (table) table.style.width = '';
        }
    }

    function init() {
        let initYear = today.getFullYear(), initMonth = today.getMonth();
        currentYear = initYear;
        currentMonth = initMonth;
        selectedDate = new Date(currentYear, currentMonth, Math.min(today.getDate(), getMonthDays(currentYear, currentMonth)));
        populateYearSelect();
        populateMonthSelect();
        updateDaySelect(currentYear, currentMonth);
        document.getElementById('yearSelect').value = currentYear;
        document.getElementById('monthSelect').value = currentMonth + 1;
        document.getElementById('daySelect').value = selectedDate.getDate();
        renderCalendar(currentYear, currentMonth, selectedDate, weekStart);
        initControls();
        document.getElementById('downloadBtn').addEventListener('click', downloadCalendarImage);
        updateMainTitle();
    }
    init();
</script>
</body>
</html>
